project_id = "ccglxkhrlfxlvpzcitso"

# Public by design: the log-a-job page already gates on a pro session, and the
# function holds no data: it only reads an image the caller sends.
[functions.scan-nameplate]
verify_jwt = false

# Same rationale as scan-nameplate: gated by the log-a-job page, no stored data.
[functions.extract-job]
verify_jwt = false

# invite-claim runs unauthenticated because v0 uses mocked sessions (no real
# Supabase JWT). It validates the caller by requiring pro_id and confirming
# the customer belongs to that pro before sending.
[functions.invite-claim]
verify_jwt = false

# geo proxies the Google Maps key for address autocomplete/geocoding. Runs
# unauthenticated like scan-nameplate (same log-a-job page): abuse is bounded by
# restricting the key to Places+Geocoding and setting a Google quota cap.
[functions.geo]
verify_jwt = false

# Stripe Connect onboarding + connected account status refresh. Mocked v0
# sessions mean no JWT; server-side we read pros by id via service role.
[functions.stripe-connect]
verify_jwt = false

# Homeowner-initiated Checkout Session creation. Amount is looked up on the
# server from the invoice; client input can only reference an invoice_id.
[functions.stripe-checkout]
verify_jwt = false

# Stripe webhook. Cannot carry a Supabase JWT; we verify Stripe's own
# signature against the raw body using STRIPE_WEBHOOK_SECRET.
[functions.stripe-webhook]
verify_jwt = false

# claim-exchange validates a single-use, hashed, expiring token from the
# branded /claim/:token page. The homeowner has no session yet by design;
# authorization comes from possession of the high-entropy token.
[functions.claim-exchange]
verify_jwt = false

# claim-qr mints a short-lived (20-min) single-use claim token and returns
# the branded /claim/:token URL so the pro can render it as a QR on-screen.
# Same rationale as invite-claim: mocked sessions in v0, so we validate the
# caller by pro_id + customer ownership server-side.
[functions.claim-qr]
verify_jwt = false

# homeowner-login mints a hashed, single-use, 30-min claim token and
# emails a homesbrain.com/claim link via Resend. Only ever emails an
# address that already has a homeowners row.
[functions.homeowner-login]
verify_jwt = false

# pro-login mirrors homeowner-login but is also the signup path for pros:
# it stores intent='pro' + first_name on the claim token so claim-exchange
# can create the pros row on first tap. Emails only via Resend.
[functions.pro-login]
verify_jwt = false

# password-reset routes forgot-password emails through Resend so they
# actually deliver. Silent-success on unknown emails to avoid leaking
# account existence.
[functions.password-reset]
verify_jwt = false


