<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>HomesBrain</title>
    <style>
      :root {
        color-scheme: light;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #f7f6f1;
        color: #16160f;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        padding: 24px;
        text-align: center;
      }
      .mark {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: #473fb0;
        display: grid;
        place-items: center;
        color: #fff;
        font-weight: 800;
        font-size: 28px;
        letter-spacing: -0.02em;
      }
      h1 {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin: 0;
      }
      p {
        margin: 0;
        color: #73706a;
        font-size: 14px;
      }
      .spinner {
        width: 22px;
        height: 22px;
        border-radius: 999px;
        border: 3px solid #e7e5de;
        border-top-color: #473fb0;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="mark" aria-hidden="true">H</div>
      <h1>Loading HomesBrain…</h1>
      <div class="spinner" aria-hidden="true"></div>
      <p>Every home remembers.</p>
    </div>
  </body>
</html>
